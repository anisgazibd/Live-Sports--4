<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
}

/* Layout */
.container{
  display:flex;
  height:100vh;
}

/* Sidebar (Channels) */
.sidebar{
  width:260px;
  background:#1c1c1c;
  overflow-y:auto;
  padding:10px;
}

.channel{
  padding:10px;
  margin:5px 0;
  background:#2a2a2a;
  cursor:pointer;
  border-radius:5px;
}

.channel:hover{
  background:#444;
}

/* Player area */
.player-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Video */
video{
  width:100%;
  height:70vh;
  background:black;
}

/* Controls */
.controls{
  display:flex;
  gap:10px;
  padding:10px;
  background:#181818;
  align-items:center;
}

button, select{
  padding:8px;
  background:#333;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* EPG */
.epg{
  padding:10px;
  background:#111;
  height:30vh;
  overflow-y:auto;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<!-- CHANNEL LIST -->
<div class="sidebar" id="channelList">
<h3>📺 Channels</h3>
</div>

<!-- PLAYER -->
<div class="player-area">

<video id="video" controls></video>

<div class="controls">
<button onclick="toggleFullscreen()">⛶ Fullscreen</button>

<select id="quality" onchange="changeQuality()">
<option value="auto">Auto Quality</option>
</select>

<button onclick="loadEPG()">📡 EPG</button>
</div>

<div class="epg" id="epgBox">
📡 EPG will show here...
</div>

</div>
</div>

<script>

// ===== SAMPLE IPTV PLAYLIST =====
const playlist = [
{
name:"📺 Channel 1 (News)",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},
{
name:"🎬 Channel 2 (Sports)",
url:"https://river-1.rutube.ru/stream/genetta-301.m9.rutube.ru/5_GzmCR6Q3_Lao9SQPe7DA/1780246595/7c13a51576b9ff2601f08f5d57dd5169/360p_stream.m3u8"
},
{
name:"🎥 Channel 3 (Movies)",
url:"https://test-streams.mux.dev/bbb_30s/bbb_30s.m3u8"
}
];

const video = document.getElementById("video");
let hls;

// ===== LOAD CHANNEL LIST =====
const list = document.getElementById("channelList");

playlist.forEach((ch, index)=>{
  let div = document.createElement("div");
  div.className="channel";
  div.innerHTML=ch.name;

  div.onclick=()=>playChannel(ch.url);

  list.appendChild(div);
});

// ===== PLAY CHANNEL =====
function playChannel(url){

  if(hls){
    hls.destroy();
  }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }
  else{
    video.src=url;
  }

  video.play();
}

// default play
playChannel(playlist[0].url);

// ===== FULLSCREEN =====
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

// ===== QUALITY (demo) =====
function changeQuality(){
  alert("Quality change depends on multi-stream HLS (master.m3u8)");
}

// ===== EPG (demo) =====
function loadEPG(){
  document.getElementById("epgBox").innerHTML=`
  <b>📡 Now Playing:</b><br>
  10:00 - Live News<br>
  11:00 - Sports Update<br>
  12:00 - Movie Block<br><br>

  <b>Next:</b><br>
  13:00 - Documentary
  `;
}

</script>

</body>
</html>
